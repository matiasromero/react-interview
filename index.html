<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todos · a soft place to plan</title>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=gambarino@400,400i&f[]=switzer@400,500,600,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body>
    <script>
      // Anti-flash: apply persisted theme/lang to <html> before React hydrates.
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t
          var l = localStorage.getItem('lang')
          if (l === 'es' || l === 'en') document.documentElement.lang = l
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
